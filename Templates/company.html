<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Company Details</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 700px; margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
    label { display:block; margin-top: 10px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    textarea { min-height: 80px; }
    button { margin-top: 14px; padding: 10px 14px; cursor: pointer; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 8px; background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Step 1: Company Details</h2>

  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">
          {% for m in messages %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <label>Company name</label>
      <input name="company_name" value="{{ data.get('company_name','') }}" required>

      <label>Company CK number</label>
      <input name="company_ck_number" value="{{ data.get('company_ck_number','') }}" required>

      <label>Company Representative</label>
      <input name="company_representative" value="{{ data.get('company_representative','') }}" required>

      <label>Representative ID number</label>
      <input name="representative_id_number" value="{{ data.get('representative_id_number','') }}" required>

      <label>Company Cellphone number</label>
      <input name="company_cellnum" required>{{ data.get('company_cellnum','') }}</input>

      <label>Company email address</label>
      <input name="company_email" required>{{ data.get('company_email','') }}</input>

      <label>Company Address</label>
      <textarea name="company_address" required>{{ data.get('company_address','') }}</textarea>

      <button type="submit">Next: Vehicle Details</button>
    </form>

    <p><a href="{{ url_for('start') }}">Back to Start</a></p>
  </div>
</body>
</html>
