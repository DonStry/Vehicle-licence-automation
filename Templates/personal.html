<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Details</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 700px; margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
    label { display:block; margin-top: 10px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    textarea { min-height: 80px; }
    button { margin-top: 14px; padding: 10px 14px; cursor: pointer; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 8px; background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Step 1 of 2: Personal Details</h2>

  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">
          {% for m in messages %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <label>Name</label>
      <input name="name" value="{{ data.get('name','') }}" required>

      <label>Surname</label>
      <input name="surname" value="{{ data.get('surname','') }}" required>

      <label>ID Number</label>
      <input name="id_number" value="{{ data.get('id_number','') }}" required>

      <label>Address</label>
      <textarea name="address" required>{{ data.get('address','') }}</textarea>

      <label>Cellphone number</label>
      <input name="cellphone" value="{{ data.get('cellphone','') }}" required>

      <label>Email</label>
      <input name="email" type="email" value="{{ data.get('email','') }}" required>

      <button type="submit">Next: Vehicle Details</button>
    </form>
  </div>
</body>
</html>
